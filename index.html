<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Opus-Map | Luxury Photography Store 2027</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --gold: #fbbf24; --bg: #020617; --cyan: #06b6d4; --purple-user: #a855f7; --blue-user: #3b82f6; }
        body, html { 
            height: 100%; margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; 
            overflow: hidden; position: fixed; width: 100%; 
            user-select: none; -webkit-user-select: none;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
            touch-action: none;
        }
        #map { height: 100vh; width: 100vw; z-index: 1; background: var(--bg); filter: saturate(0.8) contrast(1.2); }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 2px solid rgba(150, 108, 3, 0.938); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .active-cat { background: var(--gold) !important; color: #020617 !important; box-shadow: 0 0 25px rgba(251, 191, 36, 0.4); }
        .user-location-pulse { width: 14px; height: 14px; background: var(--cyan); border: 2px solid white; border-radius: 50%; position: relative; box-shadow: 0 0 15px var(--cyan); }
        .user-location-pulse::after { content: ''; position: absolute; inset: -10px; border: 2px solid var(--cyan); border-radius: 50%; animation: ripple 2s infinite; opacity: 0; }
        @keyframes ripple { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        
        #opus-lens-container { position: fixed; inset: 0; z-index: 9999; display: none; background: #000; overflow: hidden; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }
        .lens-overlay { position: absolute; inset: 0; pointer-events: none; border: 40px solid rgba(2, 6, 23, 0.8); }
        .grid-line-h { position: absolute; left: 0; width: 100%; height: 1px; background: rgba(251, 191, 36, 0.3); }
        .grid-line-v { position: absolute; top: 0; width: 1px; height: 100%; background: rgba(251, 191, 36, 0.3); }
        
        .zoom-selector-container {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; pointer-events: auto;
        }
        .btn-zoom {
            width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(251, 191, 36, 0.2); color: white; font-size: 10px;
            font-weight: 900; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); transition: all 0.2s;
        }
        .btn-zoom.active { border-color: var(--gold); color: var(--gold); background: rgba(251, 191, 36, 0.15); box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }

        #sidebar { 
            position: absolute; 
            top: 85px; 
            left: 15px; 
            z-index: 5000; 
            width: calc(100% - 40px); 
            max-width: 280px; 
            max-height: calc(100vh - 120px); 
            overflow-y: auto; 
        }
        
        .header-wrapper { position: absolute; top: 0; left: 0; right: 0; z-index: 4000; padding: 1rem; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .header-main-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        .leaflet-popup-content-wrapper { background: rgba(2, 6, 23, 0.95) !important; border: 1px solid var(--gold); border-radius: 20px !important; padding: 0 !important; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; width: 200px !important; }
        .popup-media-container { width: 100%; height: 130px; position: relative; overflow: hidden; border-radius: 20px 20px 0 0; }
        .popup-media-container video, .popup-media-container img { width: 100%; height: 100%; object-fit: cover; }

        #ai-core { position: absolute; bottom: 30px; right: 20px; z-index: 6000; width: 70px; height: 70px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 2px solid #333; overflow: hidden; }
        .lens-inner { width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle, #222 0%, #000 80%); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; animation: lensZoom 3s infinite ease-in-out; }
        .lens-glass-reflection { position: absolute; top: 20%; left: 20%; width: 15px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 50%; transform: rotate(-45deg); }
        @keyframes lensZoom { 0%, 100% { transform: scale(1); box-shadow: inset 0 0 5px var(--gold); } 50% { transform: scale(1.15); box-shadow: inset 0 0 20px var(--gold); } }
        
        /* Markers Logic */
        .marker-glow { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 15px var(--gold); animation: opus-pulse 2s infinite ease-in-out; }
        .marker-user-purple { width: 8px; height: 8px; background: var(--purple-user); border-radius: 50%; box-shadow: 0 0 10px var(--purple-user); }
        .marker-user-blue { width: 8px; height: 8px; background: var(--blue-user); border-radius: 50%; box-shadow: 0 0 10px var(--blue-user); }

        @keyframes opus-pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 5px var(--gold); }
            50% { transform: scale(1.5); opacity: 0.7; box-shadow: 0 0 20px var(--gold); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 5px var(--gold); }
        }

        .title-breath { animation: title-glow 3s infinite ease-in-out; }
        @keyframes title-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); border-color: rgba(251, 191, 36, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 30px rgba(251, 191, 36, 0.5); border-color: rgba(251, 191, 36, 0.8); transform: scale(1.02); }
        }

        /* Chat UI 2027 Fixed */
        #chat-window { 
            display: none; 
            position: absolute; bottom: 110px; right: 20px; 
            width: calc(100% - 40px); max-width: 350px; 
            max-height: 500px; z-index: 7000;
            flex-direction: column; padding: 1.25rem;
            border-radius: 30px;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body> 

    <div id="opus-lens-container">
        <video id="camera-feed" autoplay playsinline class="w-full h-full object-cover"></video>
        <div class="lens-overlay">
            <div class="grid-line-h" style="top: 33.33%"></div><div class="grid-line-h" style="top: 66.66%"></div>
            <div class="grid-line-v" style="left: 33.33%"></div><div class="grid-line-v" style="left: 66.66%"></div>
            <div class="absolute top-10 left-0 right-0 text-center">
                <p class="text-yellow-500 font-black text-[10px] uppercase tracking-[0.4em] mb-1">Opus Elite Lens</p>
                <p id="ai-suggestion" class="text-white/60 text-[8px] uppercase tracking-widest">System Ready</p>
            </div>
            <div class="zoom-selector-container">
                <button onclick="window.changeZoom(1, this)" class="btn-zoom active">1X</button>
                <button onclick="window.changeZoom(2, this)" class="btn-zoom">2X</button>
                <button onclick="window.changeZoom(5, this)" class="btn-zoom">5X</button>
            </div>
            <div class="absolute bottom-12 left-0 right-0 flex justify-around items-center px-6 pointer-events-auto">
                <button id="close-lens-btn" onclick="window.stopAILens()" class="p-4 glass rounded-full text-white active:scale-90 transition">
                    <i data-lucide="x"></i>
                </button>
                <div onclick="window.capturePhoto()" id="capture-btn" class="w-20 h-20 rounded-full border-4 border-yellow-500 flex items-center justify-center bg-white/10 active:scale-95 transition cursor-pointer">
                    <div class="w-16 h-16 rounded-full bg-white shadow-[0_0_20px_rgba(255,255,255,0.5)]"></div>
                </div>
                <button id="flash-btn" onclick="window.toggleFlash()" class="p-4 glass rounded-full text-yellow-500 active:scale-90 transition">
                    <i data-lucide="zap"></i>
                </button>
            </div>
        </div>
        <canvas id="capture-canvas" class="hidden"></canvas>
    </div>

    <div class="relative h-full w-full">
        <div class="header-wrapper">
            <div class="header-main-row">
                <div class="pointer-events-auto">
                    <button onclick="toggleMenu()" class="p-3 glass rounded-2xl text-white active:scale-90 transition">
                        <i data-lucide="align-left" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="pointer-events-auto">
                    <div class="title-breath px-6 py-2 rounded-full glass text-[16px] font-black text-yellow-500 uppercase tracking-[0.35em] border border-yellow-500/30">Opus Map</div>
                </div>
                <div class="pointer-events-auto">
                    <button id="tracking-btn" onclick="toggleTracking()" class="p-3 glass rounded-2xl text-yellow-400 active:scale-90 transition">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div id="header-text" class="pointer-events-auto text-white font-light text-[12px] tracking-[0.6em] uppercase px-6 py-1.5 bg-black/40 rounded-full backdrop-blur-xl border border-white/10 shadow-lg">...</div>
        </div>

        <div id="sidebar" class="hidden glass rounded-[30px] p-6 text-white shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.4em]">Curated</h2>
                <button onclick="toggleMenu()" class="text-white/40"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="mb-8 p-1 bg-gradient-to-r from-yellow-500/20 to-transparent rounded-2xl border border-yellow-500/20">
                <button id="auth-btn" class="w-full flex items-center justify-between p-4 bg-white/5 rounded-xl active:scale-[0.98] transition">
                    <div class="flex items-center gap-3">
                        <div id="auth-status-icon" class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                        <span id="auth-text" class="text-[10px] font-black uppercase tracking-widest text-white">Enter Opus</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-yellow-500"></i>
                </button>
            </div>
            <div id="dynamic-menu" class="space-y-3"></div>
        </div>

        <div id="chat-window" class="glass text-white">
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-yellow-500 uppercase tracking-widest">Gallery Curator</span>
                    <div id="bot-instruction" class="mt-2 space-y-1.5 border-b border-white/5 pb-3">
    <div class="flex gap-2">
        <span class="text-yellow-500 text-[8px]">●</span>
        <p class="text-[9px] uppercase tracking-tighter leading-tight text-white/60">
            Capture via <b class="text-white">Lens</b> with coordinates & upload your best shot for me to rate.
        </p>
    </div>
    <div class="flex gap-2">
        <span class="text-yellow-500 text-[8px]">●</span>
        <p class="text-[9px] uppercase tracking-tighter leading-tight text-white/60">
            Get <b class="text-yellow-500">9/10 or 10/10</b> to be featured on the global map.
        </p>
    </div>
    <div class="flex gap-2">
        <span class="text-yellow-500 text-[8px]">●</span>
        <p class="text-[9px] uppercase tracking-tighter leading-tight text-white/60">
            Ask me about <b class="text-white">Photography & Landscapes</b>. I speak all languages.
        </p>
    </div>
</div>
                </div>
                <button id="close-chat-btn" class="mt-1"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="chat-messages" class="scrollbar-hide flex-1 overflow-y-auto space-y-4"></div>
            
            <div class="flex gap-2 items-end mt-4 pt-4 border-t border-white/5">
                <textarea id="ai-input" placeholder="Message..." class="flex-1 bg-white/5 border border-white/10 rounded-xl p-3 text-xs outline-none resize-none" rows="1"></textarea>
                <div class="flex gap-2 shrink-0">
                    <button id="send-btn" class="px-4 h-10 bg-yellow-500 text-black rounded-xl font-black text-[10px] uppercase">Send</button>
                    <button id="lens-btn" class="px-4 h-10 glass text-yellow-500 rounded-xl font-black text-[10px] uppercase border border-yellow-500/20">Lens</button>
                </div>
            </div>
        </div>

        <div id="map"></div>
        <div id="ai-core">
            <div class="lens-inner">
                <div class="lens-glass-reflection"></div>
                <i data-lucide="aperture" class="text-yellow-500 w-5 h-5"></i> 
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="Urban.js"></script>
    <script src="Nature.js"></script>
    <script src="Vlog.js"></script>
    <script src="chatbot_brain.js"></script>
    <script src="CameraAI.js"></script>
    <script src="chatbot_ui.js"></script>

    <script>
        // --- FIREBASE ENGINE ---
        const firebaseConfig = (typeof opusFirebaseConfig !== 'undefined') ? opusFirebaseConfig : {
            apiKey: "AIzaSyAAH3Ue7HciHJAURntnEcN6VTTuwdnwxZI",
            authDomain: "opus-map-2027.firebaseapp.com",
            projectId: "opus-map-2027",
            storageBucket: "opus-map-2027.firebasestorage.app",
            messagingSenderId: "878459720195",
            appId: "1:878459720195:web:16161a2ebf4df24283b436"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const authBtn = document.getElementById('auth-btn');
        const authText = document.getElementById('auth-text');
        const authStatusIcon = document.getElementById('auth-status-icon');

        authBtn.onclick = () => {
            if (!auth.currentUser) auth.signInWithPopup(provider).catch(e => console.error("Elite Login Error:", e));
            else if(confirm("Boss wants to sign out?")) auth.signOut();
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                authText.innerText = user.displayName.toUpperCase();
                authStatusIcon.classList.replace('bg-yellow-500', 'bg-green-500');
                authStatusIcon.classList.add('shadow-[0_0_10px_#22c55e]');
            } else {
                authText.innerText = "Enter Opus";
                authStatusIcon.classList.replace('bg-green-500', 'bg-yellow-500');
                authStatusIcon.classList.remove('shadow-[0_0_10px_#22c55e]');
            }
        });

        // --- GLOBAL USER DATA SYNC ---
        let globalUserSpots = [];
        db.collection("global_masterpieces").onSnapshot((snapshot) => {
            globalUserSpots = [];
            snapshot.forEach(doc => globalUserSpots.push({ id: doc.id, ...doc.data() }));
            renderMarkers();
            console.log("Opus System: Global masterpiece list updated.");
        });

        // --- SECURITY (CẤM SỬA - HỆ THỐNG PHÒNG THỦ 2027) ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) return false;
        };
        document.addEventListener('dragstart', e => { if(e.target.nodeName==='IMG' || e.target.nodeName==='VIDEO') e.preventDefault(); });
        document.addEventListener('keyup', e => { if(e.key === 'PrintScreen') { navigator.clipboard.writeText(''); alert('Opus Security: Screenshot is disabled.'); } });

        // --- MAP LOGIC ---
        let activeCategoryObject = (typeof menuConfig !== 'undefined') ? menuConfig[0] : { id: 'urban', dataKey: 'Urban', label: 'Urban' };
        const map = L.map('map', { zoomControl: false, attributionControl: false, minZoom: 3, maxBounds: [[-90, -180], [90, 180]], maxBoundsViscosity: 1.0 }).setView([25, 10], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(map);
        
        let markerClusterGroup = L.markerClusterGroup({ 
            showCoverageOnHover: false, maxClusterRadius: 40,
            iconCreateFunction: (c) => L.divIcon({html:`<div class="glass flex items-center justify-center rounded-full w-10 h-10 border border-yellow-500 text-yellow-500 font-black text-[10px]">${c.getChildCount()}</div>`, className:'custom-cluster', iconSize:[40,40]})
        }).addTo(map);

        const getAllSpots = () => [
            ...(typeof urbanSpots!=='undefined'?urbanSpots:[]), 
            ...(typeof natureSpots!=='undefined'?natureSpots:[]), 
            ...(typeof vlogSpots!=='undefined'?vlogSpots:[]),
            ...globalUserSpots
        ];

        function renderMarkers() {
            markerClusterGroup.clearLayers();
            const filtered = getAllSpots().filter(s => s.category === activeCategoryObject.dataKey);
            
            const newMarkers = filtered.map(spot => {
                let iconHtml = `<div class="marker-glow"></div>`;
                if (spot.verified === "USER") {
                    if (spot.category === "Urban") iconHtml = `<div class="marker-user-purple"></div>`;
                    else if (spot.category === "Nature") iconHtml = `<div class="marker-user-blue"></div>`;
                }
                const icon = L.divIcon({className:"custom-marker", html: iconHtml, iconSize:[12,12]});
                let previewImage = (spot.images && spot.images.length > 0) ? spot.images[0] : spot.imageUrl;
                const mediaHtml = spot.videoUrl ? `<video src="${spot.videoUrl}" autoplay loop muted playsinline></video>` : `<img src="${previewImage}" class="no-select">`;
                const popupContent = `
                    <div class="text-white">
                        <div class="popup-media-container">${mediaHtml}</div>
                        <div class="p-4">
                            <p class="text-[7px] text-yellow-500 font-black uppercase mb-1">${spot.category} ${spot.verified === "USER" ? "• Global Elite" : ""}</p>
                            <h3 class="font-light text-xs mb-3 truncate">${spot.name}</h3>
                            <button onclick="goToDetail('${spot.id}')" class="w-full py-2 bg-white/5 border border-white/20 rounded-lg text-[8px] font-bold uppercase hover:bg-yellow-500 transition">
                                Explore Masterpiece
                            </button>
                        </div>
                    </div>`;
                return L.marker([spot.lat, spot.lng], {icon}).bindPopup(popupContent, {offset:[0, -10], closeButton: false});
            });
            if (newMarkers.length > 0) markerClusterGroup.addLayers(newMarkers);
            map.invalidateSize();
        }

        function renderMenu() {
            if (typeof menuConfig === 'undefined') return;
            document.getElementById('dynamic-menu').innerHTML = menuConfig.map(item => `
                <button onclick="handleMenuClick('${item.id}')" class="w-full flex items-center gap-4 p-4 rounded-2xl transition ${activeCategoryObject.id===item.id?'active-cat':'text-gray-400'}">
                    <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em]">${item.label}</span>
                </button>`).join('');
            if(window.lucide) lucide.createIcons();
        }

        window.handleMenuClick = (id) => { 
            activeCategoryObject = menuConfig.find(m => m.id === id); 
            document.getElementById('header-text').innerText = activeCategoryObject.label; 
            toggleMenu(); setTimeout(renderMarkers, 100); renderMenu(); 
        }

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('hidden');
        window.goToDetail = (id) => { 
            const s = getAllSpots().find(x=>x.id===id || x.id.toString() === id.toString()); 
            if(s){localStorage.setItem("selectedSpot", JSON.stringify(s)); window.location.href="detail.html";} 
        };

        window.addEventListener('load', () => { 
            document.getElementById('header-text').innerText = activeCategoryObject.label;
            renderMenu(); renderMarkers(); if(window.lucide) lucide.createIcons(); 
        });

        let userMarker = null, isTracking = false, watchId = null;
        const userIcon = L.divIcon({ className: 'user-location-marker', html: '<div class="user-location-pulse"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });
        window.toggleTracking = () => {
            const btn = document.getElementById('tracking-btn');
            if (!isTracking) {
                if (navigator.geolocation) {
                    isTracking = true; btn.classList.add('bg-cyan-500/20', 'text-cyan-400');
                    watchId = navigator.geolocation.watchPosition((p) => {
                        const { latitude, longitude } = p.coords;
                        if (!userMarker) userMarker = L.marker([latitude, longitude], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                        else userMarker.setLatLng([latitude, longitude]);
                        map.flyTo([latitude, longitude], 16, { duration: 1 });
                    }, null, { enableHighAccuracy: true });
                }
            } else {
                isTracking = false; btn.classList.remove('bg-cyan-500/20', 'text-cyan-400');
                if (watchId) navigator.geolocation.clearWatch(watchId);
                if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
            }
        };
    </script>
</body>
</html>
