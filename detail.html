<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Opus | Masterpiece Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; user-select: none; -webkit-user-select: none; }
        .glass { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(251, 191, 36, 0.1); }
        
        .top-nav-container {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; padding: 12px 10px; gap: 5px;
        }

        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 100;
            width: 60px; height: 100px; display: flex; align-items: center; justify-content: center;
            color: rgba(251, 191, 36, 0.4); transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer; pointer-events: auto;
        }
        .nav-arrow:hover { color: #fbbf24; background: rgba(251, 191, 36, 0.05); }
        .nav-arrow.disabled { opacity: 0; pointer-events: none; }
        .arrow-left { left: 0; border-radius: 0 20px 20px 0; }
        .arrow-right { right: 0; border-radius: 20px 0 0 20px; }

        .photo-stage { 
            height: 65vh; width: 100vw; position: relative; background: #000; overflow: hidden;
            display: flex; justify-content: center; margin-top: 50px;
        }
        .slider-container { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        
        .slide-item { min-width: 100vw; height: 100%; display: flex; justify-content: center; align-items: center; }
        .master-img { max-width: 95%; max-height: 90%; object-fit: contain; z-index: 1; box-shadow: 0 10px 50px rgba(0,0,0,0.9); display: block; }
        .center-lock { display: flex; justify-content: center; align-items: center; }

        .slider-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 30; }
        .nav-dot { width: 30px; height: 2px; background: rgba(255,255,255,0.1); transition: all 0.3s; cursor: pointer; }
        .nav-dot.active { background: #fbbf24; box-shadow: 0 0 15px #fbbf24; }

        .info-section { background: #020617; position: relative; z-index: 20; border-top: 1px solid rgba(251, 191, 36, 0.1); }
        .title-minimal { font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 200; letter-spacing: -0.02em; text-transform: uppercase; line-height: 1; }
        .comment-node { border-left: 1px solid rgba(251, 191, 36, 0.1); padding-left: 1.5rem; margin-bottom: 2rem; position: relative; }
        .no-select { pointer-events: none; user-select: none; -webkit-user-drag: none; }
        
        .vibe-pulse { animation: vibe-glow 2s infinite; }
        @keyframes vibe-glow {
            0% { box-shadow: 0 0 5px rgba(251, 191, 36, 0.2); }
            50% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.6); }
            100% { box-shadow: 0 0 5px rgba(251, 191, 36, 0.2); }
        }

        .appreciate-btn { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .appreciate-btn.active { transform: scale(1.2); filter: drop-shadow(0 0 12px #fbbf24); }

        @media (max-height: 667px) {
            .photo-stage { height: 55vh; }
            .info-section { padding: 1.5rem !important; }
        }
    </style>
</head>
<body>

    <div id="app-interface"></div>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAAH3Ue7HciHJAURntnEcN6VTTuwdnwxZI",
            authDomain: "opus-map-2027.firebaseapp.com",
            projectId: "opus-map-2027",
            storageBucket: "opus-map-2027.firebasestorage.app",
            messagingSenderId: "878459720195",
            appId: "1:878459720195:web:16161a2ebf4df24283b436"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- 2. STATE MANAGEMENT ---
        let isPlaying = false;
        let atmosphereAudio = null;
        const spot = JSON.parse(localStorage.getItem("selectedSpot"));
        if(!spot) { window.location.href = "index.html"; }

        const photoGallery = (spot.images && Array.isArray(spot.images)) ? spot.images : (spot.imageUrl ? [spot.imageUrl] : []);
        let currentSlide = 0;
        const navUrl = `https://www.google.com/maps/search/?api=1&query=${spot.lat},${spot.lng}`;

        // --- 3. GLOBAL AI VIBE GUARD 2027 (ADVANCED MULTILINGUAL FILTER) ---
        const cleanVibeFilter = (text) => {
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            const wordCount = words.length;
            const lowerText = text.toLowerCase();

            // A. Pattern Detection: Chặn cấu trúc chửi thề đa ngôn ngữ (Regex Intelligence)
            // Vi, En, Cn, Fr...
            const globalToxicPattern = /([cćç][uūû]t|[đd]m|vcl|l[oô]n|b[uū]oi|f[uū]ck|sh[iî]t|b[iî]tch|p[uū]ssy|d[iî]ck|p[oô]rn|c[oô]nnard|m[eé]rde|putain|shabi|caonima|n[iî]gga|s[l]ut|baise|salope|肏|操你妈|傻逼|贱人)/i;

            // B. Chinese Radical Block (Chặn các bộ thủ nhạy cảm trong tiếng Trung)
            const chineseToxic = /[\u808b\u6操\u5妈\u5逼\u5贱\u6滚]/;

            // 1. Kiểm tra toxic
            if (globalToxicPattern.test(lowerText) || chineseToxic.test(text)) {
                return { valid: false, reason: "Content violates Opus Global Vibe standards." };
            }

            // 2. Chặn Spam ký tự (Ví dụ: aaaaaa, fffffff)
            if (/(.)\1{5,}/.test(text.replace(/\s/g, ''))) {
                return { valid: false, reason: "Repetitive patterns are restricted." };
            }

            // 3. Anti-spam Link Filter
            const urlRegex = /(https?:\/\/[^\s]+)|(www\.[^\s]+)|(.\w{2,4}\/)/gi;
            if (urlRegex.test(text)) return { valid: false, reason: "External links are not allowed." };

            // 4. 50 Words Limit (Elite Rule)
            if (wordCount > 50) 
                return { valid: false, reason: `Insight exceeds 50 words (${wordCount}/50). Be concise.` };
            
            // 5. Short Insight Block (Cấm comment hời hợt)
            if (wordCount < 3 && text.length > 0)
                return { valid: false, reason: "Insight is too brief. Art requires deeper reflection." };
            
            return { valid: true };
        };

        // --- 4. COMMENT & APPRECIATE LOGIC ---
        const listenToComments = (spotId) => {
            db.collection("comments")
                .where("spotId", "==", spotId)
                .orderBy("timestamp", "asc")
                .onSnapshot((snapshot) => {
                    const commentList = document.getElementById('comment-list');
                    if (!commentList) return;
                    if (snapshot.empty) {
                        commentList.innerHTML = `<p class="text-[10px] text-white/20 uppercase tracking-widest italic">No insights yet...</p>`;
                        return;
                    }
                    const currentUser = auth.currentUser;
                    commentList.innerHTML = snapshot.docs.map(doc => {
                        const data = doc.data();
                        const initial = data.userName ? data.userName.charAt(0).toUpperCase() : 'E';
                        const isOwner = currentUser && currentUser.uid === data.userId;
                        
                        return `
                            <div class="comment-node group">
                                <div class="flex items-center justify-between mb-3">
                                    <div class="flex items-center gap-3">
                                        <div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-[8px] font-bold">${initial}</div>
                                        <span class="text-[9px] text-white/50 uppercase tracking-tighter">${data.userName || 'Anonymous'}</span>
                                    </div>
                                    ${isOwner ? `<button onclick="deleteComment('${doc.id}')" class="opacity-0 group-hover:opacity-100 text-[8px] text-red-500/50 hover:text-red-500 uppercase tracking-widest transition-all">Delete</button>` : ''}
                                </div>
                                <p class="text-sm text-white/70 font-light ml-9">${data.text}</p>
                            </div>`;
                    }).join('');
                });
        };

        const listenToAppreciates = (spotId) => {
            db.collection("appreciates").doc(spotId).onSnapshot(doc => {
                const data = doc.data() || { count: 0, voters: [] };
                const countEl = document.getElementById('appreciate-count');
                if(countEl) countEl.innerText = data.count || 0;
            });
        };

        window.handleAppreciate = async () => {
            const user = auth.currentUser;
            if (!user) { alert("Please Enter Opus to appreciate art."); return; }
            
            const spotId = spot.id || spot.name;
            const docRef = db.collection("appreciates").doc(spotId);
            const btn = document.getElementById('appreciate-btn');
            
            try {
                await db.runTransaction(async (transaction) => {
                    const doc = await transaction.get(docRef);
                    const data = doc.exists ? doc.data() : { count: 0, voters: [] };
                    const voters = data.voters || [];
                    let newCount = data.count || 0;

                    if (voters.includes(user.uid)) {
                        newCount = Math.max(0, newCount - 1);
                        const newVoters = voters.filter(id => id !== user.uid);
                        transaction.set(docRef, { count: newCount, voters: newVoters }, { merge: true });
                    } else {
                        newCount = newCount + 1;
                        voters.push(user.uid);
                        transaction.set(docRef, { count: newCount, voters: voters }, { merge: true });
                        btn.classList.add('active');
                        setTimeout(() => btn.classList.remove('active'), 1000);
                    }
                });
            } catch (e) { console.error("Transaction failed: ", e); }
        };

        window.deleteComment = async (id) => {
            if(confirm("Are you sure you want to remove this insight?")) {
                await db.collection("comments").doc(id).delete();
            }
        };

        window.handlePost = async () => {
            const user = auth.currentUser;
            if (!user) {
                const provider = new firebase.auth.GoogleAuthProvider();
                try { await auth.signInWithPopup(provider); renderPage(); } catch (error) { console.error(error); }
                return;
            }

            const lastPost = localStorage.getItem(`opus_cooldown_${user.uid}`);
            const now = Date.now();
            if (lastPost && (now - lastPost < 5 * 60 * 1000)) {
                const timeLeft = Math.ceil((5 * 60 * 1000 - (now - lastPost)) / 1000 / 60);
                alert(`Please wait ${timeLeft} minute(s) before posting your next insight. Reflection takes time.`);
                return;
            }

            const input = document.getElementById('user-comment');
            const msg = input.value.trim();
            if(!msg) return;

            const check = cleanVibeFilter(msg);
            if(!check.valid) {
                alert(`Opus Vibe Guard: ${check.reason}`);
                return;
            }

            try {
                await db.collection("comments").add({
                    spotId: spot.id || spot.name,
                    userName: user.displayName,
                    userId: user.uid,
                    text: msg,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                localStorage.setItem(`opus_cooldown_${user.uid}`, Date.now());
                input.value = "";
                const display = document.getElementById('word-count-display');
                if(display) display.innerText = "0 / 50 Words";
            } catch (error) { console.error("Post failed", error); }
        };

        // --- 5. CORE UI FUNCTIONS ---
        const toggleVibe = () => {
            if (!atmosphereAudio) return;
            const vibeBtn = document.getElementById('vibe-btn');
            const vibeIcon = document.getElementById('vibe-icon');
            if (!isPlaying) {
                atmosphereAudio.play();
                isPlaying = true;
                vibeBtn.classList.add('vibe-pulse', 'bg-yellow-500/20');
                vibeIcon.innerHTML = '<i data-lucide="pause-circle" class="w-3 h-3 mr-2"></i>';
            } else {
                atmosphereAudio.pause();
                isPlaying = false;
                vibeBtn.classList.remove('vibe-pulse', 'bg-yellow-500/20');
                vibeIcon.innerHTML = '<i data-lucide="music" class="w-3 h-3 mr-2"></i>';
            }
            if(window.lucide) lucide.createIcons();
        };

        const renderPage = () => {
            const container = document.getElementById('app-interface');
            const hasAudio = spot.audioUrl && spot.audioUrl.trim() !== "";
            const user = auth.currentUser;
            
            if(hasAudio && !atmosphereAudio) {
                atmosphereAudio = new Audio(spot.audioUrl);
                atmosphereAudio.loop = true;
            }

            container.innerHTML = `
                <div class="flex flex-col relative min-h-screen">
                    <div class="top-nav-container">
                        <div class="flex justify-start">
                            <button onclick="window.history.back()" class="glass px-3 py-1.5 rounded-full font-bold text-[8px] text-yellow-500 uppercase tracking-widest active:scale-95 transition border border-yellow-500/20">← Back</button>
                        </div>
                        <div class="center-lock">
                            ${hasAudio ? `
                            <button id="vibe-btn" onclick="toggleVibe()" class="glass px-3 py-1.5 rounded-full font-bold text-[8px] text-yellow-500 uppercase tracking-widest active:scale-95 transition flex items-center border border-yellow-500/40">
                                <span id="vibe-icon"><i data-lucide="music" class="w-3 h-3 mr-2"></i></span> Atmosphere
                            </button>` : ''}
                        </div>
                        <div class="flex justify-end">
                            <div class="glass px-3 py-1.5 rounded-full font-bold text-[7px] text-white/30 uppercase tracking-[0.2em] border border-white/5">Opus Insight</div>
                        </div>
                    </div>

                    <div class="photo-stage" id="stage">
                        <div id="arrow-prev" class="nav-arrow arrow-left disabled" onclick="changeSlide(-1)"><i data-lucide="chevron-left" class="w-8 h-8"></i></div>
                        <div class="slider-container" id="main-slider">${photoGallery.map(img => `<div class="slide-item"><img src="${img}" class="master-img no-select" alt="Opus Gallery"></div>`).join('')}</div>
                        <div id="arrow-next" class="nav-arrow arrow-right ${photoGallery.length <= 1 ? 'disabled' : ''}" onclick="changeSlide(1)"><i data-lucide="chevron-right" class="w-8 h-8"></i></div>
                        ${photoGallery.length > 1 ? `<div class="slider-nav">${photoGallery.map((_, i) => `<div class="nav-dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('')}</div>` : ''}
                    </div>

                    <div class="info-section p-8 md:p-20">
                        <div class="max-w-5xl mx-auto">
                            <div class="flex justify-between items-end mb-12">
                                <div class="space-y-4">
                                    <p class="text-yellow-500 font-black tracking-[0.4em] uppercase text-[10px]">${spot.category}</p>
                                    <h1 class="title-minimal italic">${spot.name}</h1>
                                </div>
                                <button onclick="handleAppreciate()" id="appreciate-btn" class="appreciate-btn glass p-4 rounded-full flex flex-col items-center gap-1 border-yellow-500 shadow-[0_0_15px_rgba(251,191,36,0.2)]">
                                    <i data-lucide="sparkles" class="w-5 h-5 text-yellow-500"></i>
                                    <span id="appreciate-count" class="text-[9px] font-bold text-yellow-500">0</span>
                                </button>
                            </div>

                            <div class="grid md:grid-cols-2 gap-12 md:gap-16 items-start mb-24">
                                <div class="space-y-6">
                                    <div class="h-[1px] w-24 bg-yellow-500/30"></div>
                                    <p class="text-white/50 leading-relaxed text-sm max-w-md font-light">${spot.description || spot.Description || "Captured at the intersection of reality and art."}</p>
                                </div>
                                <div class="space-y-10">
                                    <div class="flex justify-between items-start border-b border-white/5 pb-8">
                                        <div><p class="text-[8px] text-white/40 uppercase tracking-widest mb-1 font-bold">Hardware</p><p class="text-sm font-light text-white/90">${spot.camera || 'Leica M11-P'}</p></div>
                                        <div class="text-right"><p class="text-[8px] text-yellow-500/60 uppercase tracking-widest mb-1 font-bold">Collector's Price</p><p class="text-xl font-light text-yellow-500">${spot.price || 'Priceless'}</p></div>
                                    </div>
                                    <a href="${navUrl}" target="_blank" class="block w-full border border-yellow-500/50 hover:bg-yellow-500 hover:text-black text-yellow-500 py-6 rounded-2xl font-black text-center text-[10px] tracking-[0.4em] transition-all uppercase active:scale-95">Open in Navigation</a>
                                </div>
                            </div>

                            <div class="mt-10">
                                <div class="flex items-center gap-4 mb-12">
                                    <h2 class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.6em]">Artist Discussion</h2>
                                    <div class="flex-1 h-[1px] bg-white/5"></div>
                                </div>
                                <div id="comment-list" class="space-y-10"></div>
                                <div class="mt-16 p-6 md:p-10 glass rounded-[30px] border border-white/5 group focus-within:border-yellow-500/40 transition-all">
                                    <textarea id="user-comment" placeholder="${user ? 'Leave an elite insight...' : 'Sign in to join the discussion...'}" class="w-full bg-transparent border-none text-sm font-light text-white outline-none resize-none h-20 placeholder:text-white/10" ${!user ? 'disabled' : ''}></textarea>
                                    <div class="flex justify-between items-center mt-4 pt-4 border-t border-white/5">
                                        <div class="flex flex-col">
                                            <span class="text-[7px] text-white/20 uppercase tracking-[0.2em]">Validated by Opus AI 2027</span>
                                            <span id="word-count-display" class="text-[6px] text-yellow-500/40 uppercase mt-1 tracking-widest">0 / 50 Words</span>
                                        </div>
                                        <button onclick="handlePost()" class="px-6 py-2 ${user ? 'bg-white/5' : 'bg-yellow-500 text-black'} hover:bg-yellow-500 hover:text-black rounded-full text-[8px] font-black uppercase tracking-widest transition-all">
                                            ${user ? 'Post' : 'Enter Opus'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            initSwipe();
            initWordCounter();
            if(window.lucide) lucide.createIcons();
            listenToComments(spot.id || spot.name);
            listenToAppreciates(spot.id || spot.name);
        };

        // --- 6. SLIDER & UTILS ---
        window.changeSlide = (direction) => {
            const nextIdx = currentSlide + direction;
            if (nextIdx >= 0 && nextIdx < photoGallery.length) goToSlide(nextIdx);
        };

        window.goToSlide = (index) => {
            currentSlide = index;
            const slider = document.getElementById('main-slider');
            const dots = document.querySelectorAll('.nav-dot');
            const arrowPrev = document.getElementById('arrow-prev');
            const arrowNext = document.getElementById('arrow-next');
            if(slider) slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
            if(arrowPrev) currentSlide === 0 ? arrowPrev.classList.add('disabled') : arrowPrev.classList.remove('disabled');
            if(arrowNext) currentSlide === photoGallery.length - 1 ? arrowNext.classList.add('disabled') : arrowNext.classList.remove('disabled');
        };

        function initSwipe() {
            let startX = 0;
            const stage = document.getElementById('stage');
            if(!stage) return;
            stage.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
            stage.addEventListener('touchend', e => {
                let endX = e.changedTouches[0].clientX;
                if (startX - endX > 50 && currentSlide < photoGallery.length - 1) goToSlide(currentSlide + 1);
                if (endX - startX > 50 && currentSlide > 0) goToSlide(currentSlide - 1);
            }, {passive: true});
        }

        function initWordCounter() {
            const inputArea = document.getElementById('user-comment');
            if(inputArea) {
                inputArea.addEventListener('input', (e) => {
                    const words = e.target.value.trim().split(/\s+/).filter(w => w.length > 0);
                    const display = document.getElementById('word-count-display');
                    if(display) {
                        display.innerText = `${words.length} / 50 Words`;
                        display.style.color = words.length > 50 ? '#ef4444' : '#fbbf2466';
                    }
                });
            }
        }

        auth.onAuthStateChanged(() => { renderPage(); });

        // --- HỆ THỐNG PHÒNG THỦ OPUS 2027 (BẢO MẬT TUYỆT ĐỐI) ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) return false; };
        document.addEventListener('dragstart', e => { if(e.target.nodeName==='IMG' || e.target.nodeName==='VIDEO') e.preventDefault(); });
        document.addEventListener('keyup', e => { if(e.key === 'PrintScreen') { navigator.clipboard.writeText(''); alert('Opus Security: Screenshot is disabled.'); } });
    </script>
</body>
</html>
